<!DOCTYPE html>
<html>
<head>
  <title>Trading Chart App</title>
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>

<h2 style="text-align:center;">Live Trading Chart</h2>
<div id="chart" style="height:400px;"></div>

<script>
const chart = LightweightCharts.createChart(document.getElementById('chart'), {
  width: 400,
  height: 400
});

const candleSeries = chart.addCandlestickSeries();

candleSeries.setData([
  { time: '2024-01-01', open: 100, high: 120, low: 90, close: 110 },
  { time: '2024-01-02', open: 110, high: 130, low: 100, close: 125 },
  { time: '2024-01-03', open: 125, high: 140, low: 120, close: 135 },
  { time: '2024-01-04', open: 135, high: 150, low: 130, close: 145 }
]);
</script>

</body>
</html>
